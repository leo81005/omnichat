<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniChat Control Bar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="input-wrapper">
      <textarea
        id="textInput"
        class="text-input"
        placeholder="Type here to send to all AI models simultaneously..."
        spellcheck="true"
      ></textarea>
      <div id="filePreview" class="file-preview-container"></div>
      <input type="file" id="fileInput" multiple style="display: none;" />
      <div class="input-info">
        <span><span id="charCount">0</span> characters</span>
        <span><kbd>Enter</kbd> to submit | <kbd>Shift+Enter</kbd> for new line</span>
        <div class="button-group">
          <button id="sendBtn" class="action-btn send-btn" title="Send message">🚀 Send</button>
          <button id="attachBtn" class="action-btn attach-btn" title="Attach files or images">📎 Attach</button>
          <button id="newChatBtn" class="action-btn new-chat-btn" title="Start new chat in both">✨ New Chat</button>
          <button id="refreshBtn" class="action-btn refresh-btn" title="Refresh both pages">🔄 Refresh</button>
          <button id="zoomOutBtn" class="action-btn zoom-btn zoom-out-btn" title="Zoom out">−</button>
          <button id="zoomInBtn" class="action-btn zoom-btn zoom-in-btn" title="Zoom in">+</button>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
